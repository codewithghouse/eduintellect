<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/edullent-icon.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#fbfbfd" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1d1d1f" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Edullent" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="apple-touch-icon" href="/edullent-icon.png" />
    <link rel="preload" href="/fonts/mokoto.regular.ttf" as="font" type="font/ttf" crossorigin="anonymous" />

    <!-- Primary SEO -->
    <title>EDULLENT – Advanced Intelligence System for Modern Institutions</title>
    <meta name="description" content="Edullent is the intelligence layer between a school and its data — AI-powered dashboards for Owners, Principals, Teachers and Parents. One platform, every role." />
    <meta name="keywords" content="Edullent, school management system, AI for schools, school ERP, owner dashboard, principal dashboard, teacher dashboard, parent dashboard, school intelligence platform" />
    <meta name="author" content="Edullent" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow" />
    <link rel="canonical" href="https://edullent.com" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Edullent" />
    <meta property="og:title" content="EDULLENT – Advanced Intelligence System for Modern Institutions" />
    <meta property="og:description" content="The intelligence layer between a school and its data. AI-powered dashboards for Owners, Principals, Teachers and Parents." />
    <meta property="og:url" content="https://edullent.com" />
    <meta property="og:image" content="https://edullent.com/dashboards/hero-mockup.png" />
    <meta property="og:image:alt" content="Edullent — Smarter School Management, All in One Place" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="EDULLENT – Advanced Intelligence System for Modern Institutions" />
    <meta name="twitter:description" content="The intelligence layer between a school and its data. AI-powered dashboards for every role." />
    <meta name="twitter:image" content="https://edullent.com/dashboards/hero-mockup.png" />

    <!-- Structured data: Organization + SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://edullent.com/#organization",
          "name": "Edullent",
          "url": "https://edullent.com",
          "logo": "https://edullent.com/edullent-icon.png",
          "sameAs": []
        },
        {
          "@type": "WebSite",
          "@id": "https://edullent.com/#website",
          "url": "https://edullent.com",
          "name": "Edullent",
          "publisher": { "@id": "https://edullent.com/#organization" }
        },
        {
          "@type": "SoftwareApplication",
          "name": "Edullent",
          "applicationCategory": "EducationalApplication",
          "operatingSystem": "Web, iOS, Android",
          "description": "Advanced intelligence system for modern institutions — AI-powered dashboards for Owners, Principals, Teachers and Parents.",
          "url": "https://edullent.com",
          "publisher": { "@id": "https://edullent.com/#organization" }
        }
      ]
    }
    </script>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
